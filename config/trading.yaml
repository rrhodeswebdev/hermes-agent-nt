# Hermes × NinjaTrader 8 — trading configuration  (SHARED TEMPLATE — committed)
# Loaded by the bridge (hermes_bridge.config.BridgeConfig). Every field has a safe
# default; override here. Env vars HERMES_BRIDGE_HOST / _PORT / _AGENT also override.
#
# Keep this file NEUTRAL — it is pushed. Put PERSONAL values (your NinjaTrader account,
# your own daily risk) in `config/trading.local.yaml` (gitignored); the loader
# deep-merges that file on top of this one at startup.

# Must MATCH the StrategyId set on the NinjaScript strategy and HERMES_STRATEGY_ID.
strategy_id: hermes-default

instrument:
  symbol: MNQ           # display only; NinjaTrader sends its own instrument name
  timeframe: 1m         # the chart timeframe you attach the strategy to
  tick_size: 0.25       # MNQ Micro E-mini Nasdaq-100
  tick_value: 0.50      # USD per tick per contract (MNQ = $0.50; point value = $2)

# Deterministic strategy parameters (used by the rules/mock engine and shown to the LLM).
strategy:
  ema_fast: 9
  ema_slow: 21
  atr_period: 14
  atr_stop_mult: 1.5    # protective stop = 1.5 * ATR
  atr_target_mult: 2.0  # target = 2.0 * ATR (~1.33R)
  pullback_atr: 0.9     # RELAXED (test): wider tag tolerance → more pullbacks qualify (was 0.5)
  min_confidence: 0.40  # RELAXED (test): admit lower-conviction entries (was 0.55)

# Hard risk limits — enforced server-side by the RiskGate.
# MNQ SIM-TEST PLACEHOLDERS — tune to your real tolerance. MNQ is a micro ($2/point),
# so a 1.5*ATR stop risks only ~$30/contract; these are scaled ~10x down from the NQ
# values. max_risk_per_trade must admit at least a 1-contract trade or entries are rejected.
risk:
  max_contracts: 2             # micros are small; allow a couple while validating on Sim
  max_risk_per_trade: 250.0    # USD per-trade ceiling (effective cap is the lesser of this
                               # and remaining daily-loss room; see daily_goal.max_daily_loss)
  max_trades_per_day: 20       # RELAXED (test): allow more entries per session (was 10)
  default_stop_ticks: 16       # injected only if a decision arrives with no stop ($8 on MNQ)

# Daily goal — the bridge halts (and flattens) when either is hit. (MNQ sim placeholders.)
daily_goal:
  profit_target: 500.0         # halt new entries for the day when reached
  max_daily_loss: 400.0        # flatten + halt when reached. Your tolerance -> trading.local.yaml

# Optional Regular-Trading-Hours guard (rejects entries outside the window).
session:
  enforce_hours: false
  start: "09:30"
  end: "16:00"
  timezone: America/New_York

# Decision brain: mock (rules, no LLM) or claude (the `claude` CLI on your subscription).
agent:
  client: claude               # mock (rules, no LLM) | claude (`claude -p` oneshot)
  prefilter: none              # none | mock (mock rules screen entries before Claude is asked)
  claude:
    claude_bin: claude         # path/name of the claude launcher (must be on PATH)
    model: haiku               # sonnet | haiku | opus | full model id (haiku = fastest decisions)
    safe_mode: true            # --safe-mode: isolate from your CLAUDE.md/hooks/MCP/skills
    max_thinking_tokens: 0     # SPEED: cap extended thinking (the main latency cost). 0 = fastest
                               # (~10s); raise to ~1024 if you see too many WAITs; null = uncapped.
    # Trading knowledge loaded verbatim into the system prompt (absolute path):
    context_dir: /Users/hypawolf/code/hermes-trading-agent/hermes/context
    timeout_s: 30
    session_model: sonnet      # one-time pre-session study model (null = same as model);
                               # the study runs once off the hot path, so it can afford
                               # a bigger model than the per-bar plan analyses.
    persistent: true           # keep one claude child alive across analyses: the CLI
                               # cold start + system-prompt upload are paid once
                               # (measured ~9s saved per call); any session failure
                               # degrades to the one-shot path automatically.
    max_session_turns: 40      # recycle the persistent child after this many analyses —
                               # the conversation grows every turn and latency creeps up
                               # with it (null = never recycle).
    extra_args: []             # appended verbatim to the claude argv (advanced)

# Pre-armed plan cycle: the analysis runs BETWEEN bars and arms explicit close
# conditions; each bar close is then answered instantly from the armed plan (the LLM
# is never on the bar-close critical path). Timeouts are bridge-side budgets — the
# dashboard error tags name them — unrelated to NinjaTrader's HttpTimeoutMs.
planner:
  enabled: true
  plan_timeout_s: 75           # budget for each between-bars plan analysis
  session_timeout_s: 180       # budget for the one-time pre-session history study
  max_plan_age_bars: 2         # a plan based on a bar this many closes old no longer fires

# Swing-pivot S/R zones — served at GET /levels for the chart overlay and included
# in the plan-analysis prompt.
levels:
  enabled: true
  lookback: 3                  # bars each side that must be lower/higher to confirm a pivot
  merge_ticks: 8               # pivots within this many ticks cluster into one zone
  min_touches: 1               # zones with fewer pivots are dropped
  max_levels: 12               # strongest-first cap

# HTTP server the NinjaScript strategy connects to.
server:
  host: 0.0.0.0                # listen on all interfaces (LAN access from Windows/NT)
  port: 8787

# Execution safety. allow_live must be explicitly true to trade real money; the
# NinjaScript strategy ALSO refuses non-Sim accounts unless its AllowLive is true.
execution:
  allow_live: false
  account: Sim101              # your Sim account name -> override in config/trading.local.yaml
  entry_freshness_s: 0.0       # 0 = auto: max(one bar interval, the agent's timeout_s) —
                               # never silently tighter than the agent's budget. Set it
                               # explicitly (e.g. 60) to drop ENTRIES whose decision took
                               # >= this many seconds as stale. Exits always execute.
